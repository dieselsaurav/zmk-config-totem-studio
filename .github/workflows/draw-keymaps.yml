name: Draw Keymaps

on:
  push:
    paths:
      - "config/*.keymap"
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse and draw keymap
        run: |
          mkdir -p keymap-drawer
          keymap -c keymap-drawer/config.yaml parse -z config/totem.keymap > keymap-drawer/totem.yaml
          keymap -c keymap-drawer/config.yaml draw keymap-drawer/totem.yaml > keymap-drawer/totem.svg

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap-drawer/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update keymap diagram"
            git push
          fi
